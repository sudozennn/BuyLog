<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BuyLog — Track What You Buy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* ── CSS Variables ─────────────────────────────── */
    :root {
      --bg:        #0d0f14;
      --surface:   #141720;
      --card:      #1a1e2e;
      --border:    #252a3d;
      --accent:    #f5a623;
      --accent2:   #e8517a;
      --accent3:   #3ecfcf;
      --text:      #e8eaf2;
      --muted:     #6b7290;
      --success:   #3ecfcf;
      --danger:    #e8517a;
      --radius:    14px;
      --radius-sm: 8px;
      --shadow:    0 8px 32px rgba(0,0,0,.45);
    }

    /* ── Reset & Base ──────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* grid noise texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M0 0h1v1H0zm20 0h1v1h-1zm0 20h1v1h-1zM0 20h1v1H0z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
    }

    /* ambient glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -150px; left: -100px; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -80px; }
    .blob-3 { width: 300px; height: 300px; background: var(--accent3); top: 50%; left: 55%; }

    /* ── Layout ────────────────────────────────────── */
    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 20px 80px;
    }

    /* ── Header ────────────────────────────────────── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 32px 0 24px;
      border-bottom: 1px solid var(--border);
      gap: 16px;
      flex-wrap: wrap;
    }

    .logo {
      font-family: 'Syne', sans-serif;
      font-size: clamp(1.5rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: -1px;
    }
    .logo span { color: var(--accent); }

    .header-stats {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
    }

    .stat-pill {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 18px;
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .stat-pill strong { color: var(--text); }

    /* ── Section titles ────────────────────────────── */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .5px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Add Product Card ──────────────────────────── */
    .add-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 28px;
      margin: 32px 0 24px;
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }
    .add-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2), var(--accent3));
    }

    /* ── Form Grid ─────────────────────────────────── */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
      gap: 16px;
      align-items: end;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    label {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    input, select {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.95rem;
      padding: 11px 14px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      width: 100%;
    }
    input::placeholder { color: var(--muted); }
    input:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(245,166,35,.12);
    }
    select option { background: var(--surface); }

    /* ── Buttons ───────────────────────────────────── */
    .btn {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.9rem;
      padding: 12px 24px;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: transform .15s, box-shadow .2s, opacity .2s;
      letter-spacing: .3px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: translateY(0); }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #e08b0a);
      color: #0d0f14;
      box-shadow: 0 4px 20px rgba(245,166,35,.35);
    }
    .btn-primary:hover { box-shadow: 0 6px 28px rgba(245,166,35,.5); }

    .btn-danger {
      background: transparent;
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: 7px 12px;
      font-size: 0.78rem;
    }
    .btn-danger:hover { background: rgba(232,81,122,.12); }

    /* ── Search & Filter Bar ───────────────────────── */
    .search-bar {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
      margin-bottom: 20px;
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 12px;
      align-items: center;
    }

    .search-wrap {
      position: relative;
    }
    .search-wrap input {
      padding-left: 42px;
    }
    .search-icon {
      position: absolute;
      left: 13px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      pointer-events: none;
      font-size: 1rem;
    }

    .filter-select {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 0.88rem;
      padding: 11px 14px;
      outline: none;
      cursor: pointer;
      transition: border-color .2s;
    }
    .filter-select:focus { border-color: var(--accent); }

    /* ── Products Grid ─────────────────────────────── */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
      gap: 16px;
    }

    /* ── Product Card ──────────────────────────────── */
    .product-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      box-shadow: var(--shadow);
      transition: transform .2s, border-color .2s, box-shadow .2s;
      animation: fadeSlideIn .35s ease both;
      position: relative;
      overflow: hidden;
    }
    .product-card:hover {
      transform: translateY(-3px);
      border-color: #353a52;
      box-shadow: 0 16px 48px rgba(0,0,0,.6);
    }

    .card-stripe {
      position: absolute;
      top: 0; left: 0; bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .product-name {
      font-family: 'Syne', sans-serif;
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1.3;
      flex: 1;
    }

    .product-price {
      font-family: 'Syne', sans-serif;
      font-size: 1.4rem;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
    }
    .price-label { font-size: 0.72rem; color: var(--muted); font-family: 'DM Sans', sans-serif; font-weight: 400; }

    .card-meta {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.83rem;
      color: var(--muted);
    }
    .meta-row .ico { font-size: 0.9rem; }
    .meta-row strong { color: var(--text); font-weight: 500; }

    .store-badge {
      display: inline-block;
      background: rgba(62,207,207,.1);
      color: var(--accent3);
      border: 1px solid rgba(62,207,207,.25);
      border-radius: 999px;
      padding: 3px 12px;
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: .3px;
    }

    .card-footer {
      display: flex;
      justify-content: flex-end;
      padding-top: 8px;
      border-top: 1px solid var(--border);
    }

    /* ── Empty State ───────────────────────────────── */
    .empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--muted);
      grid-column: 1 / -1;
      animation: fadeSlideIn .4s ease;
    }
    .empty-icon { font-size: 3.5rem; margin-bottom: 16px; opacity: .6; }
    .empty h3 {
      font-family: 'Syne', sans-serif;
      font-size: 1.2rem;
      color: var(--text);
      margin-bottom: 8px;
    }

    /* ── Toast ─────────────────────────────────────── */
    #toast {
      position: fixed;
      bottom: 28px;
      right: 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 22px;
      font-size: 0.88rem;
      font-weight: 500;
      box-shadow: var(--shadow);
      transform: translateY(80px);
      opacity: 0;
      transition: transform .3s cubic-bezier(.34,1.56,.64,1), opacity .3s;
      z-index: 999;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    #toast.show { transform: translateY(0); opacity: 1; }
    #toast.success { border-color: var(--success); }
    #toast.error   { border-color: var(--danger); }
    .toast-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .success .toast-dot { background: var(--success); }
    .error   .toast-dot { background: var(--danger); }

    /* ── Modal / Edit ──────────────────────────────── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.7);
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      backdrop-filter: blur(4px);
      animation: fadeIn .2s ease;
    }
    .modal {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 24px 80px rgba(0,0,0,.8);
      animation: scaleIn .25s cubic-bezier(.34,1.56,.64,1);
    }
    .modal-title {
      font-family: 'Syne', sans-serif;
      font-size: 1.3rem;
      font-weight: 800;
      margin-bottom: 24px;
    }
    .modal-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
      margin-top: 24px;
    }
    .btn-secondary {
      background: var(--surface);
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { color: var(--text); }

    /* ── Animations ────────────────────────────────── */
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes scaleIn {
      from { opacity: 0; transform: scale(.92); }
      to   { opacity: 1; transform: scale(1); }
    }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 768px) {
      .search-bar {
        grid-template-columns: 1fr;
      }
      .form-grid {
        grid-template-columns: 1fr;
      }
      header { flex-direction: column; align-items: flex-start; }
      .header-stats { width: 100%; justify-content: flex-start; }
    }

    @media (max-width: 480px) {
      .add-card, .search-bar { padding: 18px; }
      .products-grid { grid-template-columns: 1fr; }
      #toast { left: 16px; right: 16px; bottom: 16px; }
    }

    /* ── Sort / Results row ────────────────────────── */
    .results-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      flex-wrap: wrap;
      gap: 10px;
    }
    .results-count {
      font-size: 0.83rem;
      color: var(--muted);
    }
    .results-count strong { color: var(--accent); }

    /* color stripes */
    .stripe-0 { background: var(--accent); }
    .stripe-1 { background: var(--accent2); }
    .stripe-2 { background: var(--accent3); }
    .stripe-3 { background: #a78bfa; }
    .stripe-4 { background: #34d399; }
  </style>
</head>
<body>

<!-- Ambient blobs -->
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="wrapper">

  <!-- Header -->
  <header>
    <div class="logo">Buy<span>Log</span></div>
    <div class="header-stats">
      <div class="stat-pill">🛍️ <span>Items: <strong id="stat-count">0</strong></span></div>
      <div class="stat-pill">💸 <span>Total: <strong id="stat-total">₱0.00</strong></span></div>
      <div class="stat-pill">🏪 <span>Stores: <strong id="stat-stores">0</strong></span></div>
    </div>
  </header>

  <!-- Add Product -->
  <div class="add-card">
    <div class="section-title">➕ Add a Purchase</div>
    <div class="form-grid">
      <div class="field">
        <label>Product Name</label>
        <input type="text" id="inp-name" placeholder="e.g. Sony WH-1000XM5" />
      </div>
      <div class="field">
        <label>Price (₱)</label>
        <input type="number" id="inp-price" placeholder="0.00" min="0" step="0.01"/>
      </div>
      <div class="field">
        <label>Store / Mall</label>
        <input type="text" id="inp-store" placeholder="e.g. SM Megamall" />
      </div>
      <div class="field">
        <label>Category</label>
        <select id="inp-category">
          <option value="Electronics">Electronics</option>
          <option value="Clothing">Clothing</option>
          <option value="Food & Drinks">Food & Drinks</option>
          <option value="Health & Beauty">Health & Beauty</option>
          <option value="Home & Living">Home & Living</option>
          <option value="Sports">Sports</option>
          <option value="Entertainment">Entertainment</option>
          <option value="Others">Others</option>
        </select>
      </div>
      <div class="field">
        <label>Date Purchased</label>
        <input type="date" id="inp-date" />
      </div>
      <div class="field" style="justify-content: flex-end;">
        <button class="btn btn-primary" onclick="addProduct()">
          <span>💾</span> Save Purchase
        </button>
      </div>
    </div>
  </div>

  <!-- Search & Filter -->
  <div class="search-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search by product name or store…" oninput="renderProducts()"/>
    </div>
    <select class="filter-select" id="filter-category" onchange="renderProducts()">
      <option value="">All Categories</option>
      <option>Electronics</option>
      <option>Clothing</option>
      <option>Food & Drinks</option>
      <option>Health & Beauty</option>
      <option>Home & Living</option>
      <option>Sports</option>
      <option>Entertainment</option>
      <option>Others</option>
    </select>
    <select class="filter-select" id="filter-sort" onchange="renderProducts()">
      <option value="date-desc">Newest First</option>
      <option value="date-asc">Oldest First</option>
      <option value="price-desc">Price: High → Low</option>
      <option value="price-asc">Price: Low → High</option>
      <option value="name-asc">Name: A → Z</option>
    </select>
    <select class="filter-select" id="filter-store" onchange="renderProducts()">
      <option value="">All Stores</option>
    </select>
  </div>

  <!-- Results info -->
  <div class="results-row">
    <div class="results-count" id="results-count"></div>
  </div>

  <!-- Product Grid -->
  <div class="products-grid" id="products-grid"></div>

</div>

<!-- Toast -->
<div id="toast">
  <div class="toast-dot"></div>
  <span id="toast-msg"></span>
</div>

<!-- Edit Modal -->
<div class="modal-overlay" id="modal" style="display:none;">
  <div class="modal">
    <div class="modal-title">✏️ Edit Purchase</div>
    <div class="form-grid">
      <div class="field">
        <label>Product Name</label>
        <input type="text" id="edit-name" />
      </div>
      <div class="field">
        <label>Price (₱)</label>
        <input type="number" id="edit-price" min="0" step="0.01"/>
      </div>
      <div class="field">
        <label>Store / Mall</label>
        <input type="text" id="edit-store" />
      </div>
      <div class="field">
        <label>Category</label>
        <select id="edit-category">
          <option>Electronics</option>
          <option>Clothing</option>
          <option>Food & Drinks</option>
          <option>Health & Beauty</option>
          <option>Home & Living</option>
          <option>Sports</option>
          <option>Entertainment</option>
          <option>Others</option>
        </select>
      </div>
      <div class="field">
        <label>Date Purchased</label>
        <input type="date" id="edit-date" />
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn btn-primary" onclick="saveEdit()">💾 Save Changes</button>
    </div>
  </div>
</div>

<script>
  // ── State ─────────────────────────────────────────
  let products = JSON.parse(localStorage.getItem('buylog-products') || '[]');
  let editId = null;

  const STRIPE_COLORS = ['stripe-0','stripe-1','stripe-2','stripe-3','stripe-4'];
  const CATEGORY_ICONS = {
    'Electronics': '📱', 'Clothing': '👗', 'Food & Drinks': '🍔',
    'Health & Beauty': '💄', 'Home & Living': '🏠', 'Sports': '⚽',
    'Entertainment': '🎮', 'Others': '📦'
  };

  // ── Set default date ──────────────────────────────
  document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];

  // ── Save to localStorage ──────────────────────────
  function save() {
    localStorage.setItem('buylog-products', JSON.stringify(products));
  }

  // ── Add Product ───────────────────────────────────
  function addProduct() {
    const name     = document.getElementById('inp-name').value.trim();
    const price    = parseFloat(document.getElementById('inp-price').value);
    const store    = document.getElementById('inp-store').value.trim();
    const category = document.getElementById('inp-category').value;
    const date     = document.getElementById('inp-date').value;

    if (!name)          return showToast('Please enter a product name.', 'error');
    if (isNaN(price) || price < 0) return showToast('Please enter a valid price.', 'error');
    if (!store)         return showToast('Please enter a store or mall.', 'error');
    if (!date)          return showToast('Please select a date.', 'error');

    products.unshift({
      id: Date.now(),
      name, price, store, category, date,
      stripeIdx: Math.floor(Math.random() * STRIPE_COLORS.length)
    });

    save();
    clearForm();
    renderProducts();
    showToast(`"${name}" saved successfully! ✅`, 'success');
  }

  function clearForm() {
    document.getElementById('inp-name').value  = '';
    document.getElementById('inp-price').value = '';
    document.getElementById('inp-store').value = '';
    document.getElementById('inp-category').value = 'Electronics';
    document.getElementById('inp-date').value = new Date().toISOString().split('T')[0];
  }

  // ── Delete Product ────────────────────────────────
  function deleteProduct(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    products = products.filter(x => x.id !== id);
    save();
    renderProducts();
    showToast(`"${p.name}" removed.`, 'error');
  }

  // ── Edit Product ──────────────────────────────────
  function openEdit(id) {
    const p = products.find(x => x.id === id);
    if (!p) return;
    editId = id;
    document.getElementById('edit-name').value     = p.name;
    document.getElementById('edit-price').value    = p.price;
    document.getElementById('edit-store').value    = p.store;
    document.getElementById('edit-category').value = p.category;
    document.getElementById('edit-date').value     = p.date;
    document.getElementById('modal').style.display = 'flex';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    editId = null;
  }

  function saveEdit() {
    const p = products.find(x => x.id === editId);
    if (!p) return closeModal();
    const name  = document.getElementById('edit-name').value.trim();
    const price = parseFloat(document.getElementById('edit-price').value);
    const store = document.getElementById('edit-store').value.trim();
    if (!name || isNaN(price) || !store) return showToast('Please fill all fields.', 'error');
    p.name     = name;
    p.price    = price;
    p.store    = store;
    p.category = document.getElementById('edit-category').value;
    p.date     = document.getElementById('edit-date').value;
    save();
    closeModal();
    renderProducts();
    showToast('Changes saved! ✅', 'success');
  }

  // close modal on overlay click
  document.getElementById('modal').addEventListener('click', function(e){
    if (e.target === this) closeModal();
  });

  // ── Get filtered & sorted products ────────────────
  function getFiltered() {
    const q    = document.getElementById('search-input').value.toLowerCase().trim();
    const cat  = document.getElementById('filter-category').value;
    const sort = document.getElementById('filter-sort').value;
    const store= document.getElementById('filter-store').value;

    let list = products.filter(p => {
      const matchQ     = !q || p.name.toLowerCase().includes(q) || p.store.toLowerCase().includes(q) || p.category.toLowerCase().includes(q);
      const matchCat   = !cat  || p.category === cat;
      const matchStore = !store || p.store === store;
      return matchQ && matchCat && matchStore;
    });

    list.sort((a, b) => {
      if (sort === 'date-desc') return new Date(b.date) - new Date(a.date);
      if (sort === 'date-asc')  return new Date(a.date) - new Date(b.date);
      if (sort === 'price-desc')return b.price - a.price;
      if (sort === 'price-asc') return a.price - b.price;
      if (sort === 'name-asc')  return a.name.localeCompare(b.name);
      return 0;
    });

    return list;
  }

  // ── Update store filter dropdown ──────────────────
  function updateStoreFilter() {
    const sel = document.getElementById('filter-store');
    const cur = sel.value;
    const stores = [...new Set(products.map(p => p.store))].sort();
    sel.innerHTML = '<option value="">All Stores</option>' +
      stores.map(s => `<option value="${s}"${s===cur?' selected':''}>${s}</option>`).join('');
  }

  // ── Format date ───────────────────────────────────
  function fmtDate(d) {
    if (!d) return '—';
    const dt = new Date(d + 'T00:00:00');
    return dt.toLocaleDateString('en-PH', { year:'numeric', month:'short', day:'numeric' });
  }

  // ── Format price ──────────────────────────────────
  function fmtPrice(p) {
    return '₱' + parseFloat(p).toLocaleString('en-PH', { minimumFractionDigits:2, maximumFractionDigits:2 });
  }

  // ── Render ────────────────────────────────────────
  function renderProducts() {
    updateStoreFilter();
    const list = getFiltered();
    const grid = document.getElementById('products-grid');

    // stats
    const total  = products.reduce((s, p) => s + p.price, 0);
    const stores = new Set(products.map(p => p.store)).size;
    document.getElementById('stat-count').textContent  = products.length;
    document.getElementById('stat-total').textContent  = fmtPrice(total);
    document.getElementById('stat-stores').textContent = stores;

    // results label
    const rc = document.getElementById('results-count');
    if (list.length === 0 && products.length > 0) {
      rc.innerHTML = 'No results found for current filters.';
    } else if (products.length > 0) {
      rc.innerHTML = `Showing <strong>${list.length}</strong> of ${products.length} item${products.length!==1?'s':''}`;
    } else {
      rc.innerHTML = '';
    }

    if (list.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">${products.length === 0 ? '🛒' : '🔍'}</div>
          <h3>${products.length === 0 ? 'No purchases yet!' : 'Nothing matches your search'}</h3>
          <p>${products.length === 0 ? 'Add your first purchase above to get started.' : 'Try adjusting your filters or search term.'}</p>
        </div>`;
      return;
    }

    grid.innerHTML = list.map((p, i) => `
      <div class="product-card" style="animation-delay:${i*0.04}s">
        <div class="card-stripe ${STRIPE_COLORS[p.stripeIdx ?? 0]}"></div>
        <div class="card-header">
          <div class="product-name">${escHtml(p.name)}</div>
          <div style="text-align:right">
            <div class="price-label">Price</div>
            <div class="product-price">${fmtPrice(p.price)}</div>
          </div>
        </div>
        <div class="card-meta">
          <div class="meta-row">
            <span class="ico">${CATEGORY_ICONS[p.category] || '📦'}</span>
            <span>${escHtml(p.category)}</span>
          </div>
          <div class="meta-row">
            <span class="ico">🏪</span>
            <span class="store-badge">${escHtml(p.store)}</span>
          </div>
          <div class="meta-row">
            <span class="ico">📅</span>
            <strong>${fmtDate(p.date)}</strong>
          </div>
        </div>
        <div class="card-footer">
          <div style="display:flex;gap:8px">
            <button class="btn btn-secondary" style="padding:7px 14px;font-size:.78rem;" onclick="openEdit(${p.id})">✏️ Edit</button>
            <button class="btn btn-danger" onclick="confirmDelete(${p.id})">🗑 Delete</button>
          </div>
        </div>
      </div>
    `).join('');
  }

  function escHtml(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function confirmDelete(id) {
    const p = products.find(x => x.id === id);
    if (p && confirm(`Remove "${p.name}" from your log?`)) deleteProduct(id);
  }

  // ── Toast ─────────────────────────────────────────
  let toastTimer;
  function showToast(msg, type = 'success') {
    const el = document.getElementById('toast');
    document.getElementById('toast-msg').textContent = msg;
    el.className = `show ${type}`;
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { el.className = type; }, 3200);
  }

  // ── Enter key on form ─────────────────────────────
  ['inp-name','inp-price','inp-store'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key === 'Enter') addProduct();
    });
  });

  // ── Init ──────────────────────────────────────────
  renderProducts();
</script>
</body>
</html>
